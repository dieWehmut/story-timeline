<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @font-face {
        font-family: "LXGWWenKai";
        src: url("cid:LXGWWenKai-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
      }

      body,
      table,
      td,
      a {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }

      img {
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;
        text-decoration: none;
      }

      table {
        border-collapse: collapse !important;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100% !important;
        height: 100% !important;
        background: #0b0b0f;
        font-family: "LXGWWenKai", "Noto Serif SC", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <span style="display:none!important;visibility:hidden;opacity:0;color:transparent;height:0;width:0;font-size:0;line-height:0;overflow:hidden;mso-hide:all;">
      新用户注册审核通知
    </span>
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#0b0b0f;padding:36px 16px 48px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="520" style="max-width:520px;background:#14141b;border-radius:22px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.45);border:1px solid #1f1f2a;">
            <tr>
              <td style="padding:24px 24px;background:linear-gradient(135deg,#ffd6e6,#ff9fca);color:#2a0e1a;text-align:center;font-size:20px;font-weight:700;letter-spacing:0.8px;">
                新用户注册审核喵~
              </td>
            </tr>
            <tr>
              <td style="padding:30px 30px 12px;font-size:16px;line-height:1.7;color:#f5f5f5;">
                管理员醬 😊，有新用户申请入站啦！
              </td>
            </tr>
            <tr>
              <td style="padding:0 30px 22px;font-size:15px;line-height:1.8;color:#e8e8ef;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin-top:12px;">
                  <tr>
                    <td style="padding:8px 0;font-size:14px;color:#b7b7c8;width:80px;vertical-align:top;">用户名</td>
                    <td style="padding:8px 0;font-size:14px;color:#f5f5f5;">{{.Username}}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;font-size:14px;color:#b7b7c8;width:80px;vertical-align:top;">邮箱</td>
                    <td style="padding:8px 0;font-size:14px;color:#f5f5f5;">{{.Email}}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;font-size:14px;color:#b7b7c8;width:80px;vertical-align:top;">注册方式</td>
                    <td style="padding:8px 0;font-size:14px;color:#f5f5f5;">{{.RegisterMethod}}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;font-size:14px;color:#b7b7c8;width:80px;vertical-align:top;">来意</td>
                    <td style="padding:8px 0;font-size:14px;color:#f5f5f5;">{{.Purpose}}</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:0 30px 26px;font-size:13px;line-height:1.8;color:#9a9ab0;">
                请使用下方按钮直接审核该用户喵~
              </td>
            </tr>
            <tr>
              <td style="padding:0 30px 20px;">
                <!-- Approval Form -->
                <form action="{{.BaseURL}}/api/admin/approve/{{.UserID}}" method="POST" style="margin-bottom:16px;">
                  <input type="hidden" name="token" value="{{.Token}}" />
                  <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                    <tr>
                      <td style="padding:8px 0;">
                        <label style="display:block;font-size:13px;color:#b7b7c8;margin-bottom:6px;">欢迎理由 (选填)：</label>
                        <textarea name="reason" placeholder="欢迎理由..." style="width:100%;padding:10px;border:1px solid #3a3a4a;border-radius:8px;background:#1a1a22;color:#f5f5f5;font-size:13px;font-family:inherit;resize:vertical;min-height:60px;" rows="3"></textarea>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding:12px 0 0;">
                        <input type="submit" value="✅ 通过申请" style="background:linear-gradient(135deg,#4ade80,#22c55e);color:white;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;" />
                      </td>
                    </tr>
                  </table>
                </form>

                <!-- Rejection Form -->
                <form action="{{.BaseURL}}/api/admin/reject/{{.UserID}}" method="POST">
                  <input type="hidden" name="token" value="{{.Token}}" />
                  <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                    <tr>
                      <td style="padding:8px 0;">
                        <label style="display:block;font-size:13px;color:#b7b7c8;margin-bottom:6px;">拒绝理由：</label>
                        <textarea name="reason" placeholder="请说明拒绝理由..." required style="width:100%;padding:10px;border:1px solid #3a3a4a;border-radius:8px;background:#1a1a22;color:#f5f5f5;font-size:13px;font-family:inherit;resize:vertical;min-height:60px;" rows="3"></textarea>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding:12px 0 0;">
                        <input type="submit" value="❌ 拒绝申请" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;" />
                      </td>
                    </tr>
                  </table>
                </form>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px 28px;border-top:1px solid #22222a;font-size:12px;color:#7c7c90;text-align:center;">
                <br />
                本邮件由hc的系统自动发送，请勿回复喵~
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
