<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @font-face {
        font-family: "LXGWWenKai";
        src: url("cid:LXGWWenKai-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
      }

      body,
      table,
      td,
      a {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }

      img {
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;
        text-decoration: none;
      }

      table {
        border-collapse: collapse !important;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100% !important;
        height: 100% !important;
        background: #0b0b0f;
        font-family: "LXGWWenKai", "Noto Serif SC", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <span style="display:none!important;visibility:hidden;opacity:0;color:transparent;height:0;width:0;font-size:0;line-height:0;overflow:hidden;mso-hide:all;">
      审核结果通知
    </span>
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#0b0b0f;padding:36px 16px 48px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="520" style="max-width:520px;background:#14141b;border-radius:22px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.45);border:1px solid #1f1f2a;">
            <tr>
              <td style="padding:24px 24px;background:linear-gradient(135deg,#d6d6e6,#9a9aca);color:#2a0e1a;text-align:center;font-size:20px;font-weight:700;letter-spacing:0.8px;">
                Story-Timeline 通知
              </td>
            </tr>
            <tr>
              <td style="padding:30px 30px 12px;font-size:16px;line-height:1.7;color:#f5f5f5;">
                亲爱的 {{.Login}}醬：
              </td>
            </tr>
            <tr>
              <td style="padding:0 30px 22px;font-size:15px;line-height:1.8;color:#e8e8ef;">
                很遗憾，你的入站申请暂时未能通过审核喵~<br />
                {{if .Reason}}<span style="display:block;margin-top:12px;color:#b7b7c8;font-size:13px;">原因：{{.Reason}}</span>{{end}}
                <span style="display:block;margin-top:12px;color:#b7b7c8;font-size:13px;">如有疑问可以联系管理员喵~</span>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px 28px;border-top:1px solid #22222a;font-size:12px;color:#7c7c90;text-align:center;">
                <br />
                本邮件由hc的系统自动发送，请勿回复喵~
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
