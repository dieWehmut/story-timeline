<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @font-face {
        font-family: "LXGWWenKai";
        src: url("cid:LXGWWenKai-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
      }

      body,
      table,
      td,
      a {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }

      img {
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;
        text-decoration: none;
      }

      table {
        border-collapse: collapse !important;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100% !important;
        height: 100% !important;
        background: #0b0b0f;
        font-family: "LXGWWenKai", "Noto Serif SC", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <span style="display:none!important;visibility:hidden;opacity:0;color:transparent;height:0;width:0;font-size:0;line-height:0;overflow:hidden;mso-hide:all;">
      审核通过通知
    </span>
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#0b0b0f;padding:36px 16px 48px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="520" style="max-width:520px;background:#14141b;border-radius:22px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.45);border:1px solid #1f1f2a;">
            <tr>
              <td style="padding:24px 24px;background:linear-gradient(135deg,#ffd6e6,#ff9fca);color:#2a0e1a;text-align:center;font-size:20px;font-weight:700;letter-spacing:0.8px;">
                Welcome to Story-Timeline
              </td>
            </tr>
            <tr>
              <td style="padding:30px 30px 12px;font-size:16px;line-height:1.7;color:#f5f5f5;">
                亲爱的 {{.Login}}醬 😊：
              </td>
            </tr>
            <tr>
              <td style="padding:0 30px 22px;font-size:15px;line-height:1.8;color:#e8e8ef;">
                恭喜喵！你的入站申请已经通过审核啦～<br />
                现在可以使用注册时的方式登录 Story-Timeline 了喵！<br />
                {{if .Reason}}
                <div style="margin:16px 0;padding:12px;background:#1f2a1f;border-radius:8px;border-left:4px solid #22c55e;">
                  <div style="font-size:13px;color:#86efac;font-weight:600;margin-bottom:4px;">💬 管理员留言</div>
                  <div style="font-size:14px;color:#dcfce7;">{{.Reason}}</div>
                </div>
                {{end}}
                <span style="display:block;margin-top:12px;color:#b7b7c8;font-size:13px;">期待在物語集見到你喵~</span>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:10px 30px 28px;">
                <a href="{{.Link}}" style="display:inline-block;padding:13px 32px;background:#ff7bbd;border-radius:999px;color:#2a0e1a;text-decoration:none;font-weight:700;font-size:15px;box-shadow:0 10px 24px rgba(255,123,189,0.35);">
                  前往登录
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px 28px;border-top:1px solid #22222a;font-size:12px;color:#7c7c90;text-align:center;">
                <br />
                本邮件由hc的系统自动发送，请勿回复喵~
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
