name: Sync to HuggingFace Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/hf-sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set"
            exit 1
          fi

          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          git clone https://oauth2:$HF_TOKEN@huggingface.co/spaces/REDACTED/REDACTED hf-space

          rsync -av --delete \
            --exclude ".git" \
            backend/ hf-space/

          cd hf-space

          git remote set-url origin https://oauth2:$HF_TOKEN@huggingface.co/spaces/REDACTED/REDACTED

          git add .
          git commit -m "sync from github" || echo "No changes"
          git push